<div class="card">
  <div class="card-header">
    <h2>{{ album.title }}</h2>
    <span>Álbum #{{ album.id }}</span>
  </div>

  <div class="card-body">
    <p><strong>ID propietario del álbum:</strong> {{ album.albumOwnerId }}</p>
    <p><strong>ID del álbum:</strong> {{ album.id }}</p>
    <p><strong>Título:</strong> {{ album.title }}</p>
  </div>
</div>
